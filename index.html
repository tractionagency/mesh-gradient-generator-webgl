<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Mesh Generator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #000;
      color: #fafafa;
    }
    #canvas-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 288px;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }
    .panel h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .row {
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .row > label {
      font-size: 12px;
      color: #fafafa;
    }
    .row-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .row-head span {
      font-size: 12px;
      color: rgba(250, 250, 250, 0.6);
      font-variant-numeric: tabular-nums;
    }
    .seg {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(10, 10, 10, 0.6);
    }
    .seg button {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 8px;
      border: none;
      background: transparent;
      color: rgba(250, 250, 250, 0.6);
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease;
    }
    .seg button:hover {
      color: #fafafa;
    }
    .seg button.active {
      background: #fafafa;
      color: #0a0a0a;
    }
    .color-row {
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }
    .color-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-controls input[type="text"] {
      width: 80px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: #fafafa;
      background: rgba(10, 10, 10, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      outline: none;
    }
    .color-controls input[type="text"]:focus {
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.4);
    }
    .color-controls input[type="color"] {
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #fafafa;
    }
    .export-row {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      padding-top: 12px;
      margin-top: 4px;
    }
    .export-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .export-btn {
      font-size: 12px;
      font-weight: 500;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fafafa;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    .export-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.35);
    }
    .export-btn:active {
      background: rgba(255, 255, 255, 0.18);
    }
    .toast {
      display: block;
      min-height: 14px;
      font-size: 11px;
      color: #7ee787;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .toast.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div class="panel">
    <h2>Controls</h2>
    
    <div class="row">
      <label>Style</label>
      <div id="style-seg" class="seg">
        <button class="active" data-style="water">Water</button>
        <button data-style="plasma">Plasma</button>
        <button data-style="aurora">Aurora</button>
      </div>
    </div>

    <div class="row">
      <label>Colors</label>
      <div class="color-row">
        <span>Color 1</span>
        <div class="color-controls">
          <input type="text" id="colorA-text" value="#3b2a8d" maxlength="7">
          <input type="color" id="colorA-pick" value="#3b2a8d">
        </div>
      </div>
      <div class="color-row">
        <span>Color 2</span>
        <div class="color-controls">
          <input type="text" id="colorB-text" value="#aaa7d7" maxlength="7">
          <input type="color" id="colorB-pick" value="#aaa7d7">
        </div>
      </div>
      <div class="color-row">
        <span>Color 3</span>
        <div class="color-controls">
          <input type="text" id="colorC-text" value="#f75092" maxlength="7">
          <input type="color" id="colorC-pick" value="#f75092">
        </div>
      </div>
    </div>

    <div class="row">
      <div class="row-head">
        <label>Grain</label>
        <span id="grain-val">0.06</span>
      </div>
      <input type="range" id="grain" min="0" max="0.5" step="0.01" value="0.06">
    </div>

    <div class="row export-row">
      <label>Export</label>
      <div class="export-buttons">
        <button id="copy-html" class="export-btn">Copy HTML</button>
        <button id="copy-react" class="export-btn">Copy React</button>
      </div>
    </div>
    <div id="copy-toast" class="toast"></div>
  </div>

  <script type="module">
    import { Renderer, Program, Mesh, Color, Triangle } from "https://esm.sh/ogl@1.0.11";

    // ===== Shaders =====
    const vert = `
    attribute vec2 uv;
    attribute vec2 position;
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 0, 1);
    }
    `;
    const sharedHeader = `
    precision highp float;
    uniform float uTime;
    uniform float uSwirl;
    uniform float uSpeed;
    uniform float uScale;
    uniform float uOffsetX;
    uniform float uOffsetY;
    uniform float uRotation;
    uniform float uWaveAmp;
    uniform float uWaveFreq;
    uniform float uWaveSpeed;
    uniform float uGrain;
    uniform vec3 uColorA;
    uniform vec3 uColorB;
    uniform vec3 uColorC;
    uniform vec3 uResolution;
    varying vec2 vUv;
    float wave(vec2 uv, float freq, float speed, float time) {
      return sin(uv.x * freq + time * speed) * cos(uv.y * freq + time * speed);
    }
    float random(vec2 st) {
      return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
    }
    vec3 colorDodge(vec3 base, vec3 blend) {
      return min(base / (1.0 - blend + 0.0001), 1.0);
    }
    `;
    const fragWater = (distortion) => `
    ${sharedHeader}
    void main() {
      float mr = min(uResolution.x, uResolution.y);
      vec2 uv = (vUv.xy * 2.0 - 1.0) * uResolution.xy / mr;
      uv = uv * uScale + vec2(uOffsetX, uOffsetY);

      float cosR = cos(uRotation);
      float sinR = sin(uRotation);
      uv = vec2(
        uv.x * cosR - uv.y * sinR,
        uv.x * sinR + uv.y * cosR
      );

      uv.x += wave(uv, uWaveFreq, uWaveSpeed, uTime) * uWaveAmp;
      uv.y += wave(uv + 10.0, uWaveFreq * 1.5, uWaveSpeed * 0.8, uTime) * uWaveAmp * 0.5;

      float angle = atan(uv.y, uv.x);
      float radius = length(uv);
      angle += uSwirl * radius;
      uv = vec2(cos(angle), sin(angle)) * radius;

      float d = -uTime * 0.5 * uSpeed;
      float a = 0.0;
      for (float i = 0.0; i < ${distortion.toFixed(1)}; ++i) {
        a += cos(i - d - a * uv.x);
        d += sin(uv.y * i + a);
      }
      d += uTime * 0.5 * uSpeed;

      float mix1 = (sin(d) + 1.0) * 0.5;
      float mix2 = (cos(a) + 1.0) * 0.5;
      vec3 col = mix(uColorA, uColorB, mix1);
      col = mix(col, uColorC, mix2);

      float grain = (random(gl_FragCoord.xy + uTime) - 0.5) * uGrain;
      vec3 grainCol = vec3(0.5 + grain);
      col = colorDodge(col, grainCol);

      gl_FragColor = vec4(col, 1.0);
    }
    `;
    const fragPlasma = (distortion) => `
    ${sharedHeader}
    void main() {
      float mr = min(uResolution.x, uResolution.y);
      vec2 uv = (vUv.xy * 2.0 - 1.0) * uResolution.xy / mr;
      uv = uv * uScale + vec2(uOffsetX, uOffsetY);

      float cosR = cos(uRotation);
      float sinR = sin(uRotation);
      uv = vec2(
        uv.x * cosR - uv.y * sinR,
        uv.x * sinR + uv.y * cosR
      );

      float angle = atan(uv.y, uv.x);
      float radius = length(uv);
      angle += uSwirl * 3.0 * sin(radius * 2.0 - uTime * uSpeed);
      uv = vec2(cos(angle), sin(angle)) * radius;

      float ring = sin(radius * uWaveFreq - uTime * uWaveSpeed * 4.0) * uWaveAmp;
      uv += ring;

      float d = uTime * 0.7 * uSpeed;
      float a = 0.0;
      for (float i = 0.0; i < ${distortion.toFixed(1)}; ++i) {
        a += sin(i + d + uv.x * a);
        d += cos(uv.y * i - a) * 0.8;
      }

      float mix1 = (sin(d * 1.5) + 1.0) * 0.5;
      float mix2 = (cos(a * 1.2 + radius * 2.0) + 1.0) * 0.5;
      vec3 col = mix(uColorA, uColorB, mix1);
      col = mix(col, uColorC, mix2);

      col += uColorC * (1.0 - smoothstep(0.0, 1.5, radius)) * 0.15;

      float grain = (random(gl_FragCoord.xy + uTime) - 0.5) * uGrain;
      vec3 grainCol = vec3(0.5 + grain);
      col = colorDodge(col, grainCol);

      gl_FragColor = vec4(col, 1.0);
    }
    `;
    const fragAurora = (distortion) => `
    ${sharedHeader}
    void main() {
      float mr = min(uResolution.x, uResolution.y);
      vec2 uv = (vUv.xy * 2.0 - 1.0) * uResolution.xy / mr;
      uv = uv * uScale + vec2(uOffsetX, uOffsetY);

      float cosR = cos(uRotation);
      float sinR = sin(uRotation);
      uv = vec2(
        uv.x * cosR - uv.y * sinR,
        uv.x * sinR + uv.y * cosR
      );

      float flow = sin(uv.x * uWaveFreq * 0.4 + uTime * uWaveSpeed * 2.0) * uWaveAmp * 2.0;
      flow += cos(uv.x * uWaveFreq * 0.7 - uTime * uWaveSpeed * 1.3) * uWaveAmp;
      uv.y += flow;

      float angle = atan(uv.y, uv.x);
      float radius = length(uv);
      angle += uSwirl * 0.4 * sin(uTime * 0.3);
      uv = vec2(cos(angle), sin(angle)) * radius;

      float d = -uTime * 0.3 * uSpeed;
      float a = 0.0;
      for (float i = 0.0; i < ${distortion.toFixed(1)}; ++i) {
        a += cos(i * 0.7 - d - a * uv.y);
        d += sin(uv.x * i * 0.5 + a) * 0.6;
      }

      float band = sin(uv.y * 1.5 + a * 0.5 + uTime * 0.2);
      float mix1 = (band + 1.0) * 0.5;
      float mix2 = (cos(a + uv.y * 2.0) + 1.0) * 0.5;
      vec3 col = mix(uColorA, uColorB, mix1);
      col = mix(col, uColorC, mix2 * 0.8);

      float grain = (random(gl_FragCoord.xy + uTime) - 0.5) * uGrain;
      vec3 grainCol = vec3(0.5 + grain);
      col = colorDodge(col, grainCol);

      gl_FragColor = vec4(col, 1.0);
    }
    `;
    const fragForStyle = (style, distortion) => {
      switch (style) {
        case "plasma": return fragPlasma(distortion);
        case "aurora": return fragAurora(distortion);
        case "water": default: return fragWater(distortion);
      }
    };

    // ===== Helpers & State =====
    const hexToRgb = (hex) => {
      const c = hex.replace("#", "");
      return [
        parseInt(c.substring(0, 2), 16) / 255,
        parseInt(c.substring(2, 4), 16) / 255,
        parseInt(c.substring(4, 6), 16) / 255,
      ];
    };
    const isValidHex = (s) => /^#[0-9a-fA-F]{6}$/.test(s);

    const state = {
      colors: ["#3b2a8d", "#aaa7d7", "#f75092"],
      grain: 0.06,
      style: "water",
      distortion: 5,
      swirl: 0.5,
      speed: 1.0,
      scale: 1,
      offsetX: 0.0,
      offsetY: 0.0,
      rotation: 90,
      waveAmp: 0.1,
      waveFreq: 10.0,
      waveSpeed: 0.2,
    };

    // ===== Renderer setup =====
    const container = document.getElementById("canvas-container");
    const renderer = new Renderer();
    const gl = renderer.gl;
    gl.clearColor(0, 0, 0, 1);
    container.appendChild(gl.canvas);

    function resize() {
      renderer.setSize(container.offsetWidth, container.offsetHeight);
      if (uniforms) {
        uniforms.uResolution.value = new Color(
          gl.canvas.width,
          gl.canvas.height,
          gl.canvas.width / gl.canvas.height
        );
      }
    }
    window.addEventListener("resize", resize);

    const geometry = new Triangle(gl);
    let uniforms = null;
    let program = null;
    let mesh = null;

    function buildProgram() {
      const [a, b, c] = state.colors.map(hexToRgb);
      uniforms = {
        uTime: { value: 0 },
        uSwirl: { value: state.swirl },
        uSpeed: { value: state.speed },
        uScale: { value: state.scale },
        uOffsetX: { value: state.offsetX },
        uOffsetY: { value: state.offsetY },
        uRotation: { value: state.rotation },
        uWaveAmp: { value: state.waveAmp },
        uWaveFreq: { value: state.waveFreq },
        uWaveSpeed: { value: state.waveSpeed },
        uGrain: { value: state.grain },
        uColorA: { value: new Color(...a) },
        uColorB: { value: new Color(...b) },
        uColorC: { value: new Color(...c) },
        uResolution: { value: new Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height) },
      };
      program = new Program(gl, {
        vertex: vert,
        fragment: fragForStyle(state.style, state.distortion),
        uniforms,
      });
      mesh = new Mesh(gl, { geometry, program });
    }

    resize();
    buildProgram();

    let animId;
    function update(t) {
      animId = requestAnimationFrame(update);
      program.uniforms.uTime.value = t * 0.001;
      renderer.render({ scene: mesh });
    }
    animId = requestAnimationFrame(update);

    // ===== UI wiring =====
    document.querySelectorAll("#style-seg button").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("#style-seg button").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        state.style = btn.dataset.style;
        buildProgram();
      });
    });

    const colorIds = ["A", "B", "C"];
    colorIds.forEach((id, i) => {
      const text = document.getElementById(`color${id}-text`);
      const pick = document.getElementById(`color${id}-pick`);
      const apply = (val) => {
        state.colors[i] = val;
        const [r, g, b] = hexToRgb(val);
        program.uniforms[`uColor${id}`].value = new Color(r, g, b);
      };
      text.addEventListener("input", (e) => {
        const v = e.target.value;
        if (isValidHex(v)) {
          pick.value = v;
          apply(v);
        }
      });
      pick.addEventListener("input", (e) => {
        const v = e.target.value;
        text.value = v;
        apply(v);
      });
    });

    const grainInput = document.getElementById("grain");
    const grainVal = document.getElementById("grain-val");
    grainInput.addEventListener("input", (e) => {
      const v = parseFloat(e.target.value);
      state.grain = v;
      grainVal.textContent = v.toFixed(2);
      program.uniforms.uGrain.value = v;
    });

    // ===== Export buttons =====
    const toast = document.getElementById("copy-toast");
    let toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }
    async function copyText(text, label) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(`${label} copied!`);
      } catch {
        showToast("Copy failed");
      }
    }

    const esc = (s) => s.replace(/\\/g, "\\\\").replace(/`/g, "\\`").replace(/${/g, "\\${");
    
    function buildHtmlSnippet() {
      const [a, b, c] = state.colors;
      const vertSrc = esc(vert);
      const fragSrc = esc(fragForStyle(state.style, state.distortion));
      return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Mesh — ${state.style}</title>
<style>html, body { margin: 0; height: 100%; background: #000; overflow: hidden; } #gradient-mesh { width: 100vw; height: 100vh; } #gradient-mesh canvas { display: block; width: 100%; height: 100%; }</style>
</head>
<body>
<div id="gradient-mesh"></div>
<script type="module">
import { Renderer, Program, Mesh, Color, Triangle } from "https://esm.sh/ogl@1.0.11";
const COLORS = ${JSON.stringify([a, b, c])};
const vert = \`${vertSrc}\`;
const frag = \`${fragSrc}\`;
const hexToRgb = (hex) => { const c = hex.replace("#", ""); return [parseInt(c.substring(0, 2), 16) / 255, parseInt(c.substring(2, 4), 16) / 255, parseInt(c.substring(4, 6), 16) / 255]; };
const container = document.getElementById("gradient-mesh");
const renderer = new Renderer(); const gl = renderer.gl; gl.clearColor(0, 0, 0, 1); container.appendChild(gl.canvas);
const geometry = new Triangle(gl); const [ra, rb, rc] = COLORS.map(hexToRgb);
const program = new Program(gl, { vertex: vert, fragment: frag, uniforms: { uTime: { value: 0 }, uSwirl: { value: ${state.swirl} }, uSpeed: { value: ${state.speed} }, uScale: { value: ${state.scale} }, uOffsetX: { value: ${state.offsetX} }, uOffsetY: { value: ${state.offsetY} }, uRotation: { value: ${state.rotation} }, uWaveAmp: { value: ${state.waveAmp} }, uWaveFreq: { value: ${state.waveFreq} }, uWaveSpeed: { value: ${state.waveSpeed} }, uGrain: { value: ${state.grain} }, uColorA: { value: new Color(...ra) }, uColorB: { value: new Color(...rb) }, uColorC: { value: new Color(...rc) }, uResolution: { value: new Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height) } } });
const mesh = new Mesh(gl, { geometry, program });
function resize() { renderer.setSize(container.offsetWidth, container.offsetHeight); program.uniforms.uResolution.value = new Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height); }
window.addEventListener("resize", resize); resize();
function update(t) { requestAnimationFrame(update); program.uniforms.uTime.value = t * 0.001; renderer.render({ scene: mesh }); }
requestAnimationFrame(update);
<\/script>
</body>
</html>`;
    }

    function buildReactSnippet() {
      const [a, b, c] = state.colors;
      return `// 1) npm install ogl
// 2) Copy src/components/ui/gradient-mesh.tsx from this project into your code base
// 3) Use it like this:
import { GradientMesh } from "@/components/ui/gradient-mesh";

export default function Demo() {
  return (
    <div style={{ width: "100vw", height: "100vh" }}>
      <GradientMesh
        style="${state.style}"
        colors={[${JSON.stringify(a)}, ${JSON.stringify(b)}, ${JSON.stringify(c)}]}
        grain={${state.grain}}
      />
    </div>
  );
}`;
    }

    document.getElementById("copy-html").addEventListener("click", () => copyText(buildHtmlSnippet(), "HTML"));
    document.getElementById("copy-react").addEventListener("click", () => copyText(buildReactSnippet(), "React"));
  </script>
</body>
</html>
